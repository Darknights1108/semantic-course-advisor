<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Semantic Search Results</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="appShell resultsShell">
      <section class="heroCard compactHero" aria-label="Search results title">
        <p class="eyebrow">TSW6223 Semantic Web Technology</p>
        <h1>Semantic Search Results</h1>
        <p class="heroCopy">
          Ranked entity results from the career path knowledge graph with relationship-aware explanations.
        </p>
      </section>

      <form id="resultsSearchForm" class="searchLauncher resultSearch">
        <label for="resultsSearchInput">Search query</label>
        <div class="searchRow">
          <input id="resultsSearchInput" type="search" autocomplete="off" />
          <button type="submit">Search</button>
        </div>
        <a class="backLink" href="./index.html">Back to home page</a>
      </form>

      <section class="resultLayout">
        <div id="resultSummary" class="metricGrid three"></div>
        <div id="resultList" class="stack"></div>
      </section>
    </main>
    <script type="module" src="./results.js"></script>
  </body>
</html>
